<div class="contact-form">

  <h3>Pyydä tarjous</h3>

  <form
  action="https://formsubmit.co/skyline.creative.fin@gmail.com"
  method="POST">

    <input
    type="hidden"
    name="_captcha"
    value="false">

    <input
    type="hidden"
    name="_next"
    value="https://google.com">

    <input
    type="text"
    name="name"
    placeholder="Nimi"
    required>

    <input
    type="email"
    name="email"
    placeholder="Sähköposti"
    required>

    <input
    type="tel"
    name="phone"
    placeholder="Puhelinnumero">

    <select name="service" required>

      <option value="">
        Valitse palvelu
      </option>

      <option value="Dronekuvaus">
        Dronekuvaus
      </option>

      <option value="Auton sisäsiivous">
        Auton sisäsiivous
      </option>

      <option value="Myllytys">
        Myllytys
      </option>

      <option value="Verkkosivut">
        Verkkosivut
      </option>

    </select>

    <textarea
    name="message"
    placeholder="Kerro lisää projektista (valinnainen)..."
    rows="6"
    required></textarea>

    <button type="submit" class="btn">
      Lähetä tarjouspyyntö
    </button>

  </form>

</div>
