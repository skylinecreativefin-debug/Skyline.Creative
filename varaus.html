<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ajanvaraus | Skyline Creative</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="script.js" defer></script>
</head>

<body>

<header>

  <div class="logo">Skyline Creative</div>

  <div class="menu-btn">☰</div>

  <nav>
    <a href="index.html">Etusivu</a>
    <a href="hinnasto.html">Palvelut</a>
    <a href="ajanvaraus.html">Varaa aika</a>
    <a href="tietoa.html">Tietoa</a>
    <a href="yhteystiedot.html">Yhteystiedot</a>
  </nav>

</header>

<section class="booking-hero">

  <div class="booking-overlay"></div>

  <div class="booking-content">

    <div class="tag">
      Skyline Creative
    </div>

    <h1>Varaa auton sisäsiivous</h1>

    <p>
      Sisäsiivoukset tehdään asiakkaan kotipihassa.
      Täytä tiedot huolellisesti ja lähetä ajanvarauspyyntö.
    </p>

  </div>

</section>

<section class="booking-form-section">

  <div class="booking-form-box">

    <h2>Ajanvaraus</h2>

    <form action="https://formsubmit.co/skyline.creative.fin@gmail.com" method="POST">

      <input type="hidden" name="_captcha" value="false">

      <input type="hidden" name="_subject" value="Uusi ajanvaraus Skyline Creativelle">

      <input type="text" name="nimi" placeholder="Nimi" required>

      <input type="tel" name="puhelin" placeholder="Puhelinnumero" required>

      <input type="email" name="email" placeholder="Sähköposti" required>

      <input type="text" name="auto" placeholder="Auton merkki ja malli" required>

      <input type="text" name="osoite" placeholder="Osoite (sisäsiivous tehdään kotipihassa)" required>

      <label>Valitse päivä</label>

      <input type="date" id="datePicker" name="päivä" required>

      <label>Valitse aika</label>

      <select id="timeSelect" name="aika" required>
        <option value="">Valitse ensin päivä</option>
      </select>

      <textarea
      name="lisätiedot"
      placeholder="Lisätiedot / auton kunto / toiveet"></textarea>

      <button type="submit" class="btn">
        Lähetä ajanvaraus
      </button>

    </form>

  </div>

</section>

<footer>
  <p>© 2026 Skyline Creative</p>
</footer>

</body>
</html>
